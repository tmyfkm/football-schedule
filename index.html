<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海外サッカー 日程</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg:      #1a2540;
  --surface: #131929;
  --surf2:   #182035;
  --border:  #1e2d48;
  --accent:  #e63323;
  --gold:    #f5c842;
  --text:    #dde4f0;
  --muted:   #5a6a8a;
  --green:   #22c55e;
  --main-bg: #1a2540;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans JP',sans-serif; background:var(--main-bg); color:var(--text); min-height:100vh; }

/* ── HEADER ── */
header { background:var(--surface); border-bottom:1px solid var(--border); }
.header-inner { max-width:1100px; margin:0 auto; padding:16px 20px 0; }
.site-title { display:flex; align-items:center; gap:12px; padding-bottom:14px; }
.site-title h1 { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; letter-spacing:.08em; color:#fff; line-height:1; }
.site-title p  { font-size:.68rem; color:var(--muted); letter-spacing:.1em; margin-top:3px; }
.updated { margin-left:auto; font-size:.68rem; color:var(--muted); text-align:right; line-height:1.6; }
.updated b { color:var(--green); }

/* ── MAIN NAV ── */
.nav-rows { display:flex; flex-direction:column; }
.main-nav { display:flex; gap:2px; }
.main-nav.nav-row2 { border-top:1px solid var(--border); }
.main-nav button {
  font-family:'Noto Sans JP',sans-serif; font-size:.78rem; font-weight:700;
  letter-spacing:.03em; padding:9px 11px;
  flex:1; text-align:center;
  background:transparent; color:var(--muted);
  border:none; border-bottom:3px solid transparent;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.main-nav.nav-row2 button { font-size:.74rem; padding:7px 11px; }
.main-nav button:hover { color:var(--text); }
.main-nav button.active { color:#fff; border-bottom-color:var(--accent); background:rgba(230,51,35,.06); }

/* ── GENDER TOGGLE ── */
.gender-bar {
  background:var(--surf2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0;
}
.gender-inner {
  max-width:1100px; margin:0 auto; padding:6px 20px;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.gender-toggle {
  display:flex; border-radius:6px; overflow:hidden;
  border:1px solid var(--border); flex-shrink:0;
}
.gender-toggle button {
  font-family:'Noto Sans JP',sans-serif; font-size:.75rem; font-weight:700;
  padding:5px 14px; background:transparent; color:var(--muted);
  border:none; cursor:pointer; transition:all .2s; white-space:nowrap;
}
.gender-toggle button.active { background:var(--accent); color:#fff; }

/* ── FILTER BAR ── */
.filter-bar { background:var(--surf2); border-bottom:1px solid var(--border); }
.filter-inner {
  max-width:1100px; margin:0 auto; padding:8px 20px;
  display:flex; flex-wrap:wrap; gap:8px; align-items:center;
}
.f-label { font-size:.68rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
.f-select {
  display:flex; align-items:center; gap:6px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:6px; padding:6px 10px;
}
.f-select select {
  background:transparent; border:none; color:var(--text);
  font-family:'Noto Sans JP',sans-serif; font-size:.78rem;
  outline:none; cursor:pointer; -webkit-appearance:none;
}
.f-select select option { background:#182035; }
.btn-reset {
  background:transparent; color:var(--muted); border:1px solid var(--border);
  border-radius:6px; padding:6px 12px;
  font-family:'Noto Sans JP',sans-serif; font-size:.78rem; cursor:pointer; transition:all .2s;
}
.btn-reset:hover { color:var(--text); border-color:var(--muted); }

/* ── MAIN ── */
main { max-width:1100px; margin:0 auto; padding:16px 20px 60px; background:var(--main-bg); }

.loading { text-align:center; padding:60px 20px; color:var(--muted); }
.loading .spinner {
  width:32px; height:32px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .8s linear infinite; margin:0 auto 14px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── DAY HEADER ── */
.day-header { display:flex; align-items:center; gap:10px; margin:20px 0 5px; }
.day-header:first-child { margin-top:0; }
.day-label {
  font-size:.76rem; font-weight:700; letter-spacing:.06em;
  padding:2px 10px; border-radius:4px;
  background:var(--surf2); border:1px solid var(--border); white-space:nowrap;
}
.day-label.today { background:rgba(230,51,35,.15); border-color:rgba(230,51,35,.35); color:#ff8070; }
.day-hr   { flex:1; height:1px; background:var(--border); }
.day-count{ font-size:.66rem; color:var(--muted); white-space:nowrap; }

/* ── MATCH ROW ── */
.match-row {
  display:grid;
  grid-template-columns: 52px 1fr;
  align-items:stretch;
  background:var(--surface); border:1px solid var(--border);
  border-radius:7px; margin-bottom:3px;
  overflow:hidden; transition:border-color .15s, background .15s;
  position:relative; animation:fadeUp .2s ease both;
}
.match-row::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--border); transition:background .15s;
}
.match-row:hover { border-color:rgba(230,51,35,.4); background:var(--surf2); }
.match-row:hover::before { background:var(--accent); }

.m-time {
  padding:0 6px; text-align:center;
  border-right:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
}
.m-kick { font-family:'Bebas Neue',sans-serif; font-size:1.05rem; letter-spacing:.04em; line-height:1; }

.m-main {
  padding:5px 12px;
  display:flex; flex-direction:column; gap:3px; justify-content:center;
}
.m-left { display:flex; flex-direction:column; gap:3px; }
.m-top  { display:flex; align-items:center; gap:8px; white-space:nowrap; overflow:hidden; }

.m-teams-inline {
  font-size:.82rem; font-weight:700;
  display:grid;
  grid-template-columns: 1fr 28px 1fr;
  align-items:center; gap:4px; flex:1;
}
.m-teams-inline span:first-child { text-align:right; }
.m-teams-inline span:last-child  { text-align:left; }
.m-vs { font-size:.62rem; color:var(--muted); font-weight:400; text-align:center; }

/* クレスト画像 */
.crest { width:16px; height:16px; object-fit:contain; vertical-align:middle; flex-shrink:0; }

/* チーム with crest */
.team-cell { display:flex; align-items:center; gap:5px; }
.team-cell.right { flex-direction:row-reverse; }

.m-right {
  display:flex; flex-wrap:wrap; gap:4px;
  justify-content:flex-end; align-items:center;
}

/* ── LEAGUE BADGES ── */
.l-badge {
  display:inline-block; padding:2px 7px; border-radius:3px;
  font-size:.63rem; font-weight:700; letter-spacing:.03em; white-space:nowrap; flex-shrink:0;
}
.l-epl    { background:rgba(61,25,91,.18);   color:#9B6CC0; border:1px solid rgba(61,25,91,.35); }
.l-laliga { background:rgba(255,75,0,.15);   color:#FF7040; border:1px solid rgba(255,75,0,.35); }
.l-bund   { background:rgba(211,1,12,.15);   color:#E05050; border:1px solid rgba(211,1,12,.35); }
.l-serie  { background:rgba(29,67,156,.18);  color:#6090E0; border:1px solid rgba(29,67,156,.35); }
.l-ligue  { background:rgba(0,178,169,.15);  color:#00C8B8; border:1px solid rgba(0,178,169,.35); }
.l-ligap  { background:rgba(0,90,160,.18);   color:#60A0D8; border:1px solid rgba(0,90,160,.35); }
.l-erediv { background:rgba(255,100,0,.15);  color:#FF8844; border:1px solid rgba(255,100,0,.3); }
.l-spl    { background:rgba(0,50,140,.18);   color:#5080C8; border:1px solid rgba(0,50,140,.35); }
.l-champ  { background:rgba(0,29,94,.2);     color:#6090D0; border:1px solid rgba(0,29,94,.4); }
.l-uel    { background:rgba(248,123,27,.15); color:#F09050; border:1px solid rgba(248,123,27,.35); }
.l-champ2 { background:rgba(80,60,160,.18);  color:#9080D0; border:1px solid rgba(80,60,160,.35); }
.l-belgique { background:rgba(0,0,0,.2); color:#f5d020; border:1px solid rgba(245,208,32,.3); }
.l-middle { background:rgba(0,120,80,.18);   color:#40C890; border:1px solid rgba(0,120,80,.35); }
.l-north  { background:rgba(0,60,180,.18);   color:#60A0F0; border:1px solid rgba(0,60,180,.35); }
.l-womens { background:rgba(200,60,120,.18); color:#E080A0; border:1px solid rgba(200,60,120,.35); }
.l-youth  { background:rgba(60,160,60,.18);  color:#70D070; border:1px solid rgba(60,160,60,.35); }
.l-wc     { background:rgba(180,140,0,.18);  color:#E0B820; border:1px solid rgba(180,140,0,.35); }

.p-tag {
  display:inline-block;
  background:rgba(245,200,66,.07); border:1px solid rgba(245,200,66,.15);
  border-radius:3px; padding:1px 7px;
  font-size:.68rem; color:#c89c18; font-weight:700; white-space:nowrap;
}

.empty { text-align:center; padding:50px 20px; color:var(--muted); }
.empty .ico { font-size:2.4rem; margin-bottom:10px; }

footer { text-align:center; padding:16px; border-top:1px solid var(--border); background:var(--main-bg); font-size:.66rem; color:var(--muted); letter-spacing:.05em; line-height:1.8; }

@keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:600px){
  .updated { display:none; }
  .site-title h1 { font-size:1.3rem; }
  .m-teams-inline { font-size:.76rem; }
  .main-nav button { font-size:.72rem; padding:9px 8px; }
}
</style>
</head>

function toJST(utcStr) {
  const d = new Date(utcStr);
  const jst = new Date(d.getTime() + 9*60*60*1000);
  let h = jst.getUTCHours();
  const m = jst.getUTCMinutes();
  if (h < 6) h += 24;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function toJSTDate(utcStr) {
  const d = new Date(utcStr);
  const jst = new Date(d.getTime() + 9*60*60*1000);
  if (jst.getUTCHours() < 6) {
    const prev = new Date(jst.getTime() - 24*60*60*1000);
    return prev.toISOString().split('T')[0];
  }
  return jst.toISOString().split('T')[0];
}

// UI 制御
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const GENDER_TABS = ["europe","japanese","national","north","youth"];
const FILTER_TABS = ["europe","middle","north"];

function updateUI() {
  document.querySelectorAll(".main-nav button").forEach(b => b.classList.remove("active"));
  const activeBtn = document.getElementById("tab-" + currentTab);
  if (activeBtn) activeBtn.classList.add("active");

  const gBar = document.getElementById("genderBar");
  gBar.style.display = GENDER_TABS.includes(currentTab) ? "" : "none";
  document.getElementById("gBtn-male").classList.toggle("active",   currentGender === "male");
  document.getElementById("gBtn-female").classList.toggle("active", currentGender === "female");

  const fBar = document.getElementById("filterBar");
  if (FILTER_TABS.includes(currentTab)) {
    fBar.style.display = "";
    rebuildLeagueSelect();
  } else {
    fBar.style.display = "none";
  }
}

function rebuildLeagueSelect() {
  const sel = document.getElementById("leagueSel");
  const options = TAB_LEAGUES[currentTab] || [];
  let html = `<option value="all">全リーグ</option>`;
  options.forEach(o => { html += `<option value="${o.v}">${o.l}</option>`; });
  sel.innerHTML = html;
  sel.value = fLeague;
}

function setTab(tab, el) {
  currentTab = tab;
  fLeague = "all";
  history.replaceState(null, '', '#' + tab);
  updateUI();
  render();
}

function setGender(g) {
  currentGender = g;
  updateUI();
  render();
}

function applyFilter() {
  fLeague = document.getElementById("leagueSel").value;
  render();
}
function resetFilter() {
  fLeague = "all";
  document.getElementById("leagueSel").value = "all";
  render();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// データ読み込み
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DATA_URL = 'data/matches.json';

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    MATCHES = json.matches || [];
    document.getElementById('updatedAt').textContent = json.updatedAt || '—';
    render();
  } catch (e) {
    document.getElementById('content').innerHTML =
      `<div class="empty"><div class="ico">⚠️</div><p>データの読み込みに失敗しました</p></div>`;
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// レンダリング
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render() {
  let data = MATCHES.filter(m => {
    const mTab    = getMatchTab(m);
    const mGender = getMatchGender(m);

    if (currentTab === "japanese") {
      if (!["europe","middle","north"].includes(mTab)) return false;
      if (!m.japanese || m.japanese.length === 0) return false;
      if (mGender !== currentGender) return false;
    } else if (currentTab === "national") {
      if (mTab !== "national") return false;
      if (mGender !== currentGender) return false;
    } else if (currentTab === "youth") {
      if (mTab !== "youth") return false;
      if (mGender !== currentGender) return false;
    } else if (currentTab === "europe") {
      if (mTab !== "europe") return false;
      if (mGender !== currentGender) return false;
    } else if (currentTab === "middle") {
      if (mTab !== "middle") return false;
    } else if (currentTab === "north") {
      if (mTab !== "north") return false;
      if (mGender !== currentGender) return false;
    }

    if (fLeague !== "all" && m.league !== fLeague) return false;
    return true;
  });

  if (data.length === 0) {
    document.getElementById("content").innerHTML =
      `<div class="empty"><div class="ico">📭</div><p>表示できる試合がありません</p></div>`;
    return;
  }

  const grouped = {};
  data.forEach(m => {
    const dateKey = toJSTDate(m.kickoffUTC);
    (grouped[dateKey] = grouped[dateKey] || []).push(m);
  });

  let html = "";
  Object.keys(grouped).sort().forEach(date => {
    const isToday = date === todayJST;
    const d = new Date(date + "T12:00:00+09:00");
    const dow = DOW[d.getDay()];
    const label = `${date.replace(/-/g,"/")}(${dow})`;
    const list = grouped[date];

    html += `<div class="day-header">
      <div class="day-label ${isToday?"today":""}">${isToday?"● 今日　":""} ${label}</div>
      <div class="day-hr"></div>
      <div class="day-count">${list.length}試合</div>
    </div>`;

    list.forEach((m, i) => {
      const leagueJa = LEAGUE_JA[m.league] || m.league;
      const homeJa   = teamJa(m.home);
      const awayJa   = teamJa(m.away);
      const jstTime  = toJST(m.kickoffUTC);
      const lClass   = m.lClass || "l-champ";
      const mGender  = getMatchGender(m);

      const hCrestUrl = m.homeCrest || TEAM_CREST[m.home] || null;
      const aCrestUrl = m.awayCrest || TEAM_CREST[m.away] || null;
      const hCrest = hCrestUrl
        ? `<img class="crest" src="${hCrestUrl}" alt="" onerror="this.style.display='none'">`
        : "";
      const aCrest = aCrestUrl
        ? `<img class="crest" src="${aCrestUrl}" alt="" onerror="this.style.display='none'">`
        : "";

      const womenBadge = mGender === "female"
        ? `<span class="l-badge l-womens">♀</span>` : "";

      const playersJa = (m.japanese && m.japanese.length > 0)
        ? m.japanese.map(n => playerJa(n)) : [];
      const pHtml = playersJa.length > 0
        ? `<div class="m-right">${playersJa.map(n=>`<span class="p-tag">${n}</span>`).join("")}</div>`
        : "";

      html += `<div class="match-row" style="animation-delay:${i*.04}s">
        <div class="m-time"><div class="m-kick">${jstTime}</div></div>
        <div class="m-main">
          <div class="m-left">
            <div class="m-top">
              <span class="l-badge ${lClass}">${leagueJa}</span>
              ${womenBadge}
              <div class="m-teams-inline">
                <span class="team-cell right">${hCrest}${homeJa}</span>
                <span class="m-vs">vs</span>
                <span class="team-cell">${aCrest}${awayJa}</span>
              </div>
            </div>
          </div>
          ${pHtml}
        </div>
      </div>`;
    });
  });

  document.getElementById("content").innerHTML = html;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 初期化
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
updateUI();
loadData();
setInterval(loadData, 60*60*1000);
setInterval(render,   60*1000);
</script>
</body>
</html>
