name: Fetch Matches
 
on:
  schedule:
    # 水曜 12:00 JST (= 水曜 03:00 UTC)
    - cron: '0 3 * * 3'
    # 月1回：選手マスタ更新（毎月1日 06:00 JST = 前日 21:00 UTC）
    - cron: '0 21 1 * *'
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
 
      # 月1日のみ選手マスタを強制更新
      - name: Update players master (月1回)
        if: github.event.schedule == '0 21 1 * *'
        run: node scripts/fetch_players.js
        env:
          FOOTBALLDATA_KEY: ${{ secrets.FOOTBALLDATA_KEY }}
          FORCE_UPDATE: '1'
 
      # 毎週水曜 試合データ取得
      - name: Fetch matches
        run: node scripts/fetch_matches.js
        env:
          RAPIDAPI_KEY:     ${{ secrets.RAPIDAPI_KEY }}
          FOOTBALLDATA_KEY: ${{ secrets.FOOTBALLDATA_KEY }}
          APIFY_TOKEN:      ${{ secrets.APIFY_TOKEN }}   #
 
      - name: Commit and push
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add data/matches.json data/players.json
          git diff --cached --quiet || git commit -m "chore: update data [$(date +'%Y-%m-%d')]"
          git pull --rebase origin main
          git push
