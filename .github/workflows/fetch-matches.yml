name: Fetch Matches

on:
  schedule:
    # 毎週月曜 07:00 JST (= 日曜 22:00 UTC)
    - cron: '0 22 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch matches
        run: node scripts/fetch_matches.js
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/matches.json
          git diff --cached --quiet || git commit -m "chore: update matches data [$(date +'%Y-%m-%d')]"
          git pull --rebase origin main
          git push
