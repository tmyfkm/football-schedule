name: Sofascore データ取得

on:
  schedule:
    # 毎日 07:00 JST = 22:00 UTC に実行
    - cron: "0 22 * * *"
  workflow_dispatch: # 手動実行ボタンも使えるようにする

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージのインストール
        run: pip install requests

      - name: Sofascore からデータ取得
        run: python scripts/fetch_sofascore.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet \
            && echo "変更なし。スキップ。" \
            || git commit -m "🤖 データ更新: $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')" && git push
