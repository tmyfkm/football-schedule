name: Check Leagues
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run league checker
        run: node check_leagues.js
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      - name: Commit CSV result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add league_check_result.csv
          git diff --cached --quiet || git commit -m "Add league check result"
          git pull --rebase origin main
          git push
